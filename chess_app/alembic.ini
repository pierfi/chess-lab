# Alembic configuration per Chess Lab (Fase 3).
# Lanciare dalla directory chess_app/:  alembic upgrade head
# L'URL del DB è impostato in alembic/env.py da backend.db.DATABASE_URL
# (rispetta la env var CHESS_LAB_DB), quindi qui è solo un placeholder.

[alembic]
script_location = alembic
prepend_sys_path = .
# path_separator è la forma non deprecata di version_path_separator (Alembic >= 1.13)
path_separator = os
sqlalchemy.url = sqlite:///backend/chess_lab.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
